<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5e6ec">
<title>🌸 シフト管理</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:#fdf6f8;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:14px;color:#3d1f2a;overscroll-behavior:none}

button{border:none;cursor:pointer;background:transparent}
button:active{opacity:0.7;transform:scale(0.97)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#d9a0b4;border-radius:2px}

.sp{width:36px;height:36px;border:3px solid #eacdd6;border-top-color:#c2506e;border-radius:50%;animation:spin 0.8s linear infinite}
#setup{position:fixed;inset:0;background:#fdf6f8;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:9998;overflow-y:auto}
#setup.show{display:flex}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:36px">🌸</div>
  <div class="sp"></div>
  <div style="font-size:13px;color:#8a6070" id="loading-msg">起動中...</div>
</div>

<div id="setup">
  <div style="max-width:460px;width:100%">
    <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#c2506e;text-align:center;margin-bottom:6px">🌸 シフト管理</div>
    <div style="font-size:13px;color:#8a6070;text-align:center;margin-bottom:24px">GASのURLを設定してください</div>

    <div style="background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 24px rgba(194,80,110,0.10)">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">GASウェブアプリURL</div>
      <textarea id="urlInput" rows="3"
        placeholder="https://script.google.com/macros/s/xxxxx/exec"
        style="width:100%;border:1.5px solid #eacdd6;border-radius:10px;padding:10px 12px;font-size:13px;color:#3d1f2a;resize:none;line-height:1.5;outline:none"></textarea>
      <div style="font-size:11px;color:#c4a0b0;margin-top:6px;margin-bottom:16px">GASをデプロイして発行されたURLを貼り付けてください</div>
      <div id="setupError" style="color:#9b2335;font-size:12px;margin-bottom:10px;display:none"></div>
      <button id="connectBtn" onclick="connectGAS()"
        style="width:100%;background:linear-gradient(135deg,#c2506e,#7a5080);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700">
        接続する
      </button>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid #eacdd6">
        <div style="font-size:11px;font-weight:700;color:#8a6070;margin-bottom:8px">GASセットアップ手順</div>
        <ol style="font-size:11px;color:#8a6070;padding-left:16px;line-height:2.0">
          <li>Googleスプレッドシートを新規作成</li>
          <li>「拡張機能」→「Apps Script」を開く</li>
          <li>Code.gs の内容を貼り付けて保存</li>
          <li>「デプロイ」→「新しいデプロイ」→ウェブアプリ</li>
          <li>アクセス「全員」→「デプロイ」</li>
          <li>表示されたURLを上に貼り付けて接続</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<div id="app" style="display:none"></div>

<script>
// ============================================================
// ★ GAS URLの設定（接続後に自動保存されます）
// ============================================================
const LS_URL  = 'shift_gas_url_v2';
const LS_DATA = 'shift_data_v7';
const LS_MEM  = 'shift_members_v7';

// ★ GASウェブアプリURL（埋め込み済み）
const PRESET_GAS_URL = 'https://script.google.com/macros/s/AKfycbzjhujE1cfG7JwZJMfdo6b7_rJTbu9ntfGdTv7-l-KcqFKxNgZVJji7_Xj8_nlRbU6-BA/exec';
let GAS_URL = localStorage.getItem(LS_URL) || PRESET_GAS_URL;

// ============================================================
// CONSTANTS
// ============================================================
const DEFAULT_MEMBERS=[
  {id:1,name:'苅間澤',category:'main'},{id:2,name:'糟谷',category:'main'},
  {id:3,name:'梶賀',category:'main'},{id:4,name:'庄子',category:'main'},
  {id:5,name:'蛮治',category:'main'},{id:6,name:'庄司',category:'main'},
  {id:7,name:'及川',category:'sub'},{id:8,name:'大久保',category:'sub'},
  {id:9,name:'川村',category:'sub'},{id:10,name:'山田',category:'sub'},
];
const STATUS_LIST=['事務所番','金庫番','掃除','責任者','夜間現場','公休','有休','午前半休','午後半休'];
const DUTY_STATUS_MAP={'__office__':'事務所番','__safe__':'金庫番','__clean__':'掃除'};
const STATUS_STYLE={
  '事務所番':{bg:'#fce8ed',text:'#d4496a',border:'#e88fa8'},
  '金庫番'  :{bg:'#fdf3dc',text:'#b5860d',border:'#d4a843'},
  '掃除'    :{bg:'#e0f5ec',text:'#2e7d5e',border:'#6abf99'},
  '責任者'  :{bg:'#e8e0f5',text:'#4a235a',border:'#bb8fce'},
  '夜間現場':{bg:'#fdf2cc',text:'#7d6608',border:'#f7dc6f'},
  '公休'    :{bg:'#fadbd8',text:'#922b21',border:'#f1948a'},
  '有休'    :{bg:'#fde9d9',text:'#943126',border:'#f0a07a'},
  '午前半休':{bg:'#e8daef',text:'#5b2c6f',border:'#c39bd3'},
  '午後半休':{bg:'#d6eaf8',text:'#1a5276',border:'#7fb3d3'},
};
const DUTY_COLS=[
  {key:'__office__',label:'事務所番',accent:'#d4496a',lightBg:'#fce8ed',tag:'#e88fa8',req:true},
  {key:'__safe__',  label:'金庫番',  accent:'#b5860d',lightBg:'#fdf3dc',tag:'#d4a843',req:false},
  {key:'__clean__', label:'掃除',    accent:'#2e7d5e',lightBg:'#e0f5ec',tag:'#6abf99',req:false},
];
const HOLIDAYS=['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20',
  '2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21',
  '2025-08-11','2025-09-15','2025-09-23','2025-10-13','2025-11-03','2025-11-23',
  '2025-11-24','2025-12-23','2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06'];
const C={
  bg:'#fdf6f8',bgAlt:'#fff9fb',hBg:'#f5e6ec',hBorder:'#e4b8c8',
  accent:'#c2506e',aLight:'#f5c6d4',
  wkBg:'#fce8ed',sun:'#c2506e',sat:'#7a5080',
  text:'#3d1f2a',sub:'#8a6070',muted:'#c4a0b0',
  border:'#eacdd6',strong:'#d9a0b4',
  warnBg:'#fde8e8',warnBorder:'#f5a0a0',warnText:'#9b2335',
  mainCat:'#c2506e',subCat:'#7a5080',
  mainBg:'#fce8ed',subBg:'#ede8f5',
  mainBorder:'#e4b8c8',subBorder:'#c9b8dc',
};

// ============================================================
// DATE UTILS
// ============================================================
function getMonthDays(y,m){const days=[];for(let d=new Date(y,m-1,21);d<=new Date(y,m,20);d.setDate(d.getDate()+1))days.push(new Date(d));return days;}
function toDS(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isHol(d){return HOLIDAYS.includes(toDS(d));}
function isWk(d){const w=d.getDay();return w===0||w===6;}
function isReq(d){return isWk(d)||isHol(d);}
function dayLbl(d){return['日','月','火','水','木','金','土'][d.getDay()];}
function dayClr(d){if(d.getDay()===0||isHol(d))return C.sun;if(d.getDay()===6)return C.sat;return C.text;}
const TODAY_DS=toDS(new Date());

// ============================================================
// GAS API通信
// ============================================================
async function gasLoad(){
  try{
    const res=await fetch(GAS_URL+'?action=load',{redirect:'follow'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'load failed');
    return data;
  }catch(e){
    throw new Error('読み込み失敗: '+e.message);
  }
}

async function gasSave(shiftData,members){
  // POSTで送信（GETはURL長制限でデータ量が多いと失敗するため）
  try{
    const body=new URLSearchParams({
      action:'save',
      shift:JSON.stringify(shiftData),
      members:JSON.stringify(members),
    });
    const res=await fetch(GAS_URL,{
      method:'POST',
      body:body,
      redirect:'follow',
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'save failed');
    return data;
  }catch(e){
    throw new Error('保存失敗: '+e.message);
  }
}

// 接続テスト＆URL保存
async function connectGAS(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url)return;
  const btn=document.getElementById('connectBtn');
  const err=document.getElementById('setupError');
  btn.textContent='接続中...';btn.disabled=true;err.style.display='none';
  try{
    GAS_URL=url;
    const data=await gasLoad();
    localStorage.setItem(LS_URL,url);
    initApp(data);
  }catch(e){
    err.textContent='⚠ 接続失敗: URLを確認してください。\n('+e.message+')';
    err.style.display='block';
    btn.textContent='接続する';btn.disabled=false;
  }
}

// ============================================================
// 保存レイヤー（デバウンス）
// ============================================================
let saveTimer=null;
const SAVE_DELAY=800;

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(flushSave,SAVE_DELAY);}

async function flushSave(){
  try{
    setSaveStatus('saving');
    if(GAS_URL){
      await gasSave(state.data,state.members);
    }else{
      localStorage.setItem(LS_DATA,JSON.stringify(state.data));
      localStorage.setItem(LS_MEM,JSON.stringify(state.members));
    }
    setSaveStatus('saved');
  }catch(e){
    setSaveStatus('error');
    console.error('保存エラー:',e);
  }
}

function setSaveStatus(s){
  const ind=document.getElementById('save-indicator');
  if(!ind)return;
  clearTimeout(window._sit);
  if(s==='saving'){
    ind.textContent='⏳ 保存中...';
    ind.style.background='rgba(122,80,128,0.88)';
    ind.style.opacity='1';ind.style.transform='translateY(0)';
  }else if(s==='saved'){
    ind.textContent=GAS_URL?'☁️ 保存しました':'✓ 保存しました';
    ind.style.background='rgba(46,125,94,0.92)';
    ind.style.opacity='1';ind.style.transform='translateY(0)';
    window._sit=setTimeout(()=>{ind.style.opacity='0';ind.style.transform='translateY(-8px)';},2000);
  }else{
    ind.textContent='⚠ 保存失敗';
    ind.style.background='rgba(155,35,53,0.92)';
    ind.style.opacity='1';ind.style.transform='translateY(0)';
    window._sit=setTimeout(()=>{ind.style.opacity='0';ind.style.transform='translateY(-8px)';},3500);
  }
}

// ============================================================
// STATE
// ============================================================
const today=new Date();
let state={
  year:today.getFullYear(),month:today.getMonth()+1,
  data:{},members:DEFAULT_MEMBERS,
  editMode:'view',showMembers:false,showSettings:false,activeAction:'view',showToday:false,swapMode:false,swapDayA:null,swapDayB:null,showResetModal:false,
  tab:'shift',modal:null,personalMember:null,
  tempDuty:[],tempStatus:[],
  copyMode:false,copyStatus:null,copyDays:new Set(),
  assignOpts:{pair:false,consec:false,noConsec:false},
  showAssign:false,copied:false,nextId:11,
};
let longPressTimer=null,rerenderScheduled=false,memberSaveTimer=null;
let lastRenderedMonth=''; // 月切替検知用

function setState(patch,save){
  Object.assign(state,typeof patch==='function'?patch(state):patch);
  if(save)scheduleSave();
  if(!rerenderScheduled){rerenderScheduled=true;requestAnimationFrame(()=>{rerenderScheduled=false;render();});}
}
function updateMemberName(id,newName){
  state.members=state.members.map(x=>x.id===id?{...x,name:newName}:x);
  clearTimeout(memberSaveTimer);memberSaveTimer=setTimeout(()=>scheduleSave(),400);
}

// ============================================================
// HELPERS
// ============================================================
function syncDutyToMembers(dd,key,names,all){const label=DUTY_STATUS_MAP[key];const r={...dd};all.forEach(({name})=>{const p=Array.isArray(r[name])?r[name]:(r[name]?[r[name]]:[]);const has=p.includes(label);const assigned=names.includes(name);if(assigned&&!has)r[name]=[...p,label];else if(!assigned&&has)r[name]=p.filter(s=>s!==label);});r[key]=names;return r;}
function syncMemberToDuty(dd,name,sts){const r={...dd};r[name]=sts;Object.entries(DUTY_STATUS_MAP).forEach(([key,label])=>{const p=Array.isArray(r[key])?r[key]:(r[key]?[r[key]]:[]);const has=sts.includes(label);const inD=p.includes(name);if(has&&!inD)r[key]=[...p,name];else if(!has&&inD)r[key]=p.filter(n=>n!==name);});return r;}
function getDutyArr(nd,ds,key){const v=nd[ds]?.[key];return Array.isArray(v)?v:(v?[v]:[]);}
function getStatuses(ds,name){const v=state.data[ds]?.[name];if(!v)return[];return Array.isArray(v)?v:[v];}
function getDutyNames(ds,key){return getDutyArr(state.data,ds,key);}
function commitDuty(ds,key,names){const d={...state.data};const dd={...(d[ds]||{})};d[ds]=syncDutyToMembers(dd,key,names,state.members);setState({data:d},true);}
function commitMember(ds,name,sts){const d={...state.data};const dd={...(d[ds]||{})};d[ds]=syncMemberToDuty(dd,name,sts);setState({data:d},true);}
function mainMembers(){return state.members.filter(m=>m.category==='main');}
function subMembers(){return state.members.filter(m=>m.category==='sub');}
function days(){return getMonthDays(state.year,state.month);}

const ABSENT=['公休','有休','午前半休','午後半休'];
function availMain(ds){return mainMembers().map(m=>m.name).filter(n=>!getStatuses(ds,n).some(s=>ABSENT.includes(s)));}
function buildCount(nd){const c={};mainMembers().forEach(m=>{c[m.name]=0;});days().forEach(d=>{const ds=toDS(d);DUTY_COLS.forEach(dc=>{getDutyArr(nd,ds,dc.key).forEach(n=>{if(c[n]!==undefined)c[n]++;});});});return c;}
function adjDS(ds,delta){const d=new Date(ds);d.setDate(d.getDate()+delta);return d.toISOString().slice(0,10);}
function buildPool(avail,nd,ds,count,opts){if(!avail.length)return[];return[...avail].sort((a,b)=>{let sa=0,sb=0;const pDS=adjDS(ds,-1);if(opts.consec){const aP=DUTY_COLS.some(dc=>getDutyArr(nd,pDS,dc.key).includes(a));const bP=DUTY_COLS.some(dc=>getDutyArr(nd,pDS,dc.key).includes(b));sa+=aP?-5:0;sb+=bP?-5:0;}if(opts.noConsec){const aP=DUTY_COLS.some(dc=>getDutyArr(nd,pDS,dc.key).includes(a));const bP=DUTY_COLS.some(dc=>getDutyArr(nd,pDS,dc.key).includes(b));sa+=aP?+10:0;sb+=bP?+10:0;}sa+=(count[a]||0);sb+=(count[b]||0);return sa-sb;});}
function applyDuty(nd,ds,key,names){const dd={...(nd[ds]||{})};return{...nd,[ds]:syncDutyToMembers(dd,key,names,state.members)};}

/**
 * 自動振り分けロジック（改訂版）
 * ルール:
 *   土日祝 → 事務所番・金庫番・掃除を同一人物
 *   平日   → 金庫番・掃除を同一人物（事務所番は不要）
 * 返り値: { data: 更新後データ, alerts: 割り当て不可日リスト }
 */
function runAutoAssign(nd,opts,skip){
  const count=buildCount(nd);
  const alerts=[]; // 担当者不足の日

  days().forEach(d=>{
    const ds=toDS(d);
    const wkEnd=isReq(d); // 土日祝
    const avail=availMain(ds);

    if(wkEnd){
      // ── 土日祝：事務所番・金庫番・掃除を同一人物 ──
      const offEx=getDutyArr(nd,ds,'__office__');
      const safeEx=getDutyArr(nd,ds,'__safe__');
      const cleanEx=getDutyArr(nd,ds,'__clean__');
      const allSet=offEx.length&&safeEx.length&&cleanEx.length;
      if(skip&&allSet)return; // スキップモードで全設定済みならパス

      // 既に誰かが設定されていればその人を使う（優先順位: 事務所番>金庫番>掃除）
      let chosen=offEx[0]||safeEx[0]||cleanEx[0]||null;
      if(!chosen){
        const pool=buildPool(avail,nd,ds,count,opts);
        if(!pool.length){
          alerts.push((d.getMonth()+1)+'/'+d.getDate()+'('+dayLbl(d)+') 土日祝');
          return;
        }
        chosen=pool[0];
      }
      // 3列すべて同一人物に設定
      nd=applyDuty(nd,ds,'__office__',[chosen]);
      nd=applyDuty(nd,ds,'__safe__',[chosen]);
      nd=applyDuty(nd,ds,'__clean__',[chosen]);
      count[chosen]=(count[chosen]||0)+3;

    } else {
      // ── 平日：金庫番・掃除を同一人物（事務所番は不要）──
      const safeEx=getDutyArr(nd,ds,'__safe__');
      const cleanEx=getDutyArr(nd,ds,'__clean__');
      const bothSet=safeEx.length&&cleanEx.length;
      if(skip&&bothSet)return;

      // 既に片方が設定されていればその人を使う
      let chosen=safeEx[0]||cleanEx[0]||null;
      if(!chosen){
        const pool=buildPool(avail,nd,ds,count,opts);
        if(!pool.length){
          alerts.push((d.getMonth()+1)+'/'+d.getDate()+'('+dayLbl(d)+') 平日');
          return;
        }
        chosen=pool[0];
      }
      nd=applyDuty(nd,ds,'__safe__',[chosen]);
      nd=applyDuty(nd,ds,'__clean__',[chosen]);
      count[chosen]=(count[chosen]||0)+2;
    }
  });

  return {data:nd, alerts};
}

function showAssignAlerts(alerts){
  if(!alerts||!alerts.length)return;
  // ボトムシートでアラート表示
  const{ov,sheet}=buildSheet(()=>ov.remove());
  sheet.appendChild(div({fontFamily:'Georgia,serif',fontSize:'16px',fontWeight:'700',color:'#9b2335',marginBottom:'8px'},['⚠️ 担当者不足']));
  sheet.appendChild(div({fontSize:'12px',color:'#8a6070',marginBottom:'14px'},['以下の日はメインメンバー全員が休みのため自動振り分けできませんでした。手動で設定してください。']));
  const list=div({background:'#fde8e8',border:'1px solid #f5a0a0',borderRadius:'12px',padding:'12px 14px',marginBottom:'16px'});
  alerts.forEach(a=>{
    const row=div({display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid #f5a0a0'});
    row.appendChild(div({fontSize:'13px',color:'#9b2335',fontWeight:'700'},['⚠ '+a]));
    list.appendChild(row);
  });
  // 最後のborderBottomを消す
  if(list.lastChild)list.lastChild.style.borderBottom='none';
  sheet.appendChild(list);
  sheet.appendChild(btn({width:'100%',background:'#f5f5f5',border:'none',color:'#8a6070',borderRadius:'12px',padding:'14px',fontSize:'13px',minHeight:'52px'},()=>ov.remove(),'閉じる'));
  const appEl=document.getElementById('app');if(appEl)appEl.appendChild(ov);
}

function autoAssignPreview(){
  let c=0;
  days().forEach(d=>{
    const ds=toDS(d);
    const wkEnd=isReq(d);
    if(wkEnd){
      // 土日祝：3列すべて未設定なら1件としてカウント
      if(!getDutyArr(state.data,ds,'__office__').length)c++;
    } else {
      // 平日：金庫番が未設定なら1件
      if(!getDutyArr(state.data,ds,'__safe__').length)c++;
    }
  });
  return c;
}

// DOM HELPERS
function el(tag,attrs,children){const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k==='className')e.className=v;else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});if(children)(Array.isArray(children)?children:[children]).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});return e;}
function div(s,ch){return el('div',{style:s},ch);}
function btn(s,onclick,ch){return el('button',{style:s,onClick:onclick},ch);}
function span(s,t){return el('span',{style:s},[t]);}
function txt(t){return document.createTextNode(t);}

// ============================================================
// RENDER
// ============================================================
function render(){const app=document.getElementById('app');app.innerHTML='';app.appendChild(buildApp());}

function buildApp(){
  const {tab,editMode,showMembers,showSettings,activeAction,showToday,modal,showAssign}=state;
  const ds=days();const mm=mainMembers();const sm=subMembers();
  const misOfc=ds.filter(d=>isReq(d)&&!getDutyNames(toDS(d),'__office__').length).length;
  const misSafe=ds.filter(d=>!getDutyNames(toDS(d),'__safe__').length).length;
  const misClean=ds.filter(d=>!getDutyNames(toDS(d),'__clean__').length).length;
  const root=div({background:C.bg,color:C.text,fontSize:'14px',minHeight:'100vh',display:'flex',flexDirection:'column'});
  root.appendChild(buildHeader(misOfc,misClean,misSafe));
  root.appendChild(el('div',{id:'save-indicator',style:{position:'fixed',top:'8px',left:'50%',transform:'translateX(-50%) translateY(-8px)',background:'rgba(46,125,94,0.92)',color:'#fff',borderRadius:'20px',padding:'5px 16px',fontSize:'12px',fontWeight:'700',zIndex:'999',pointerEvents:'none',opacity:'0',transition:'opacity 0.25s,transform 0.25s',boxShadow:'0 2px 8px rgba(0,0,0,0.18)',whiteSpace:'nowrap'}},['✓ 保存しました']));
  const content=div({flex:'1',paddingBottom:'68px',overflowY:'auto',WebkitOverflowScrolling:'touch'});
  if((showMembers||activeAction==='member')&&tab==='shift'&&!showToday)content.appendChild(buildMemberEditor());
  if(state.swapMode&&tab==='shift'&&!showToday)content.appendChild(buildSwapBanner());
  if(showToday)content.appendChild(buildTodayDashboard());
  else if(showSettings)content.appendChild(buildSettingsPanel());
  else if(tab==='shift')content.appendChild(buildShiftTab(ds,mm,sm));
  else if(tab==='summary')content.appendChild(buildSummaryTab(ds));
  else if(tab==='personal')content.appendChild(buildPersonalTab(ds));
  root.appendChild(content);
  root.appendChild(buildBottomNav());
  if(showAssign)root.appendChild(buildAssignModal());
  if(state.showResetModal)root.appendChild(buildResetModal());
  if(modal)root.appendChild(buildModal());
  return root;
}

// ── HEADER
function buildHeader(misOfc,misSafe,misClean){
  const {tab,editMode,showMembers,showSettings,activeAction,year,month}=state;
  const isShift=tab==='shift';
  const hasWarn=isShift&&!showSettings&&(misOfc+misSafe+misClean>0);

  const h=div({background:C.hBg,borderBottom:'1px solid '+C.hBorder,
    position:'sticky',top:'0',zIndex:'100',
    boxShadow:'0 2px 8px rgba(194,80,110,0.10)'});

  // ── 上段：ロゴ + 月ナビ ──
  const top=div({padding:'8px 12px',display:'flex',alignItems:'center',gap:'8px'});
  top.appendChild(div({fontFamily:'Georgia,serif',fontSize:'18px',fontWeight:'700',color:C.accent,flexShrink:'0'},['🌸']));

  if(tab==='shift'||tab==='summary'||tab==='personal'){
    const nav=div({display:'flex',alignItems:'center',gap:'4px',flex:'1',justifyContent:'center'});
    const navBtn=(lbl,cb)=>btn({background:'#fff',border:'1px solid '+C.aLight,color:C.accent,
      borderRadius:'8px',width:'36px',height:'36px',display:'flex',alignItems:'center',
      justifyContent:'center',fontSize:'16px',fontWeight:'700',flexShrink:'0'},cb,lbl);
    nav.appendChild(navBtn('◀',()=>{let m=state.month-1,y=state.year;if(m<1){m=12;y--;}setState({month:m,year:y,swapDayA:null,swapDayB:null});}));
    const mbox=div({background:'#fff',border:'1px solid '+C.aLight,borderRadius:'8px',
      padding:'5px 10px',fontWeight:'700',fontSize:'14px',color:C.accent,textAlign:'center',minWidth:'100px'});
    mbox.appendChild(txt(year+'年'+month+'月'));
    nav.appendChild(mbox);
    nav.appendChild(navBtn('▶',()=>{let m=state.month+1,y=state.year;if(m>12){m=1;y++;}setState({month:m,year:y,swapDayA:null,swapDayB:null});}));
    top.appendChild(nav);
  }
  h.appendChild(top);

  // ── 下段：アクションタブ（シフトタブのみ表示）──
  if(isShift){
    const actionTabs=[
      {key:'view',  label:'👁 閲覧'},
      {key:'edit',  label:'✏️ 編集'},
      {key:'assign',label:'✨ 振り分け'},
      {key:'member',label:'👥 メンバー'},
      {key:'swap',  label:'🔄 入れ替え'},
      {key:'reset', label:'🗑 リセット'},
      {key:'sync',  label:'📥 同期'},
      {key:'settings',label:'⚙️ 設定'},
    ];
    const tabBar=div({
      display:'flex',gap:'0',
      borderTop:'1px solid '+C.hBorder,
      overflowX:'auto',WebkitOverflowScrolling:'touch',
      scrollbarWidth:'none',
    });
    tabBar.style.cssText+=':-webkit-scrollbar{display:none}';

    actionTabs.forEach(({key,label})=>{
      const isActive=(key==='view'&&editMode==='view'&&!showMembers&&!showSettings&&activeAction==='view')
        ||(key==='edit'&&editMode==='edit'&&activeAction==='edit')
        ||(key==='member'&&showMembers)
        ||(key==='settings'&&showSettings)
        ||(key==='assign'&&activeAction==='assign')
        ||(key==='swap'&&state.swapMode)
        ||(key==='reset'&&activeAction==='reset')
        ||(key==='sync'&&activeAction==='sync');

      const b=btn({
        padding:'8px 10px',fontSize:'12px',fontWeight:isActive?'700':'500',
        color:isActive?C.accent:C.sub,background:isActive?C.mainBg:'transparent',
        borderBottom:isActive?'2px solid '+C.accent:'2px solid transparent',
        whiteSpace:'nowrap',flexShrink:'0',
        transition:'color 0.15s,border-color 0.15s',
      },()=>{
        if(key==='view'){setState({editMode:'view',showMembers:false,showSettings:false,activeAction:'view'});}
        else if(key==='edit'){setState({editMode:'edit',showMembers:false,showSettings:false,activeAction:'edit'});}
        else if(key==='assign'){setState({editMode:'edit',showMembers:false,showSettings:false,activeAction:'assign',showAssign:true});}
        else if(key==='member'){setState({showMembers:!showMembers,showSettings:false,activeAction:showMembers?'view':'member'});}
        else if(key==='reset'){
          setState({activeAction:'reset',showResetModal:true});
        }
        else if(key==='sync'){
          setState({activeAction:'sync'});
          if(GAS_URL){
            setSaveStatus('saving');
            gasLoad().then(data=>{
              if(data.shiftData)state.data=data.shiftData;
              if(Array.isArray(data.members)&&data.members.length>0)state.members=data.members;
              setState({activeAction:editMode==='edit'?'edit':'view'});setSaveStatus('saved');
            }).catch(()=>{setSaveStatus('error');setState({activeAction:editMode==='edit'?'edit':'view'});});
          } else { alert('GASのURLが設定されていません。⚙️設定からURLを入力してください。');setState({activeAction:'view'}); }
        }
        else if(key==='swap'){setState({swapMode:!state.swapMode,swapDayA:null,swapDayB:null,editMode:'edit',showMembers:false,showSettings:false,activeAction:state.swapMode?'edit':'swap'});}
        else if(key==='settings'){setState({showSettings:!showSettings,showMembers:false,activeAction:showSettings?'view':'settings'});}
      },label);
      tabBar.appendChild(b);
    });
    h.appendChild(tabBar);
  }

  // ── 警告バー ──
  if(hasWarn){
    const wb=div({background:C.warnBg,border:'1px solid '+C.warnBorder,
      padding:'6px 12px',color:C.warnText,fontSize:'12px',fontWeight:'700',
      display:'flex',gap:'12px',alignItems:'center',flexWrap:'wrap'});
    if(misOfc>0)wb.appendChild(txt('⚠ 事務所番 '+misOfc+'日'));
    if(misSafe>0)wb.appendChild(txt('⚠ 金庫番 '+misSafe+'日'));
    if(misClean>0)wb.appendChild(txt('⚠ 掃除 '+misClean+'日'));
    h.appendChild(wb);
  }
  return h;
}

// ── SETTINGS PANEL
function buildSettingsPanel(){
  const wrap=div({padding:'16px 14px 40px',maxWidth:'500px',margin:'0 auto'});
  wrap.appendChild(div({fontFamily:'Georgia,serif',fontSize:'16px',fontWeight:'700',color:C.accent,marginBottom:'16px'},['⚙️ 設定']));
  const statusBg=GAS_URL?'#e0f5ec':'#fff9fb';
  const statusFg=GAS_URL?'#2e7d5e':'#8a6070';
  const statusBd=GAS_URL?'#6abf99':C.border;
  wrap.appendChild(div({background:statusBg,border:'1px solid '+statusBd,borderRadius:'10px',padding:'10px 14px',marginBottom:'16px',fontSize:'13px',color:statusFg,fontWeight:'700'},[GAS_URL?'☁️ スプレッドシートに同期中':'💾 ローカル保存のみ']));
  const card=div({background:'#fff',border:'1px solid '+C.border,borderRadius:'14px',padding:'16px',marginBottom:'16px'});
  card.appendChild(div({fontWeight:'700',fontSize:'13px',marginBottom:'8px'},['GASウェブアプリURL']));
  const urlInput=el('textarea',{style:{width:'100%',border:'1.5px solid '+C.border,borderRadius:'10px',padding:'10px 12px',fontSize:'12px',color:C.text,resize:'none',lineHeight:'1.5',outline:'none',minHeight:'60px'}});
  urlInput.value=GAS_URL;
  card.appendChild(urlInput);
  card.appendChild(div({fontSize:'11px',color:C.muted,marginTop:'6px',marginBottom:'12px'},['GASをデプロイして発行されたURLを貼り付けてください']));
  const errDiv=div({fontSize:'12px',color:C.warnText,display:'none',marginBottom:'8px'});
  card.appendChild(errDiv);
  const saveBtn=btn({width:'100%',background:C.accent,color:'#fff',border:'none',borderRadius:'10px',padding:'12px',fontSize:'14px',fontWeight:'700',marginBottom:'8px'},async()=>{
    const url=urlInput.value.trim();
    if(!url){GAS_URL='';localStorage.removeItem(LS_URL);setState({});return;}
    saveBtn.textContent='接続確認中...';saveBtn.disabled=true;errDiv.style.display='none';
    try{
      GAS_URL=url;
      const data=await gasLoad();
      localStorage.setItem(LS_URL,url);
      if(data.shiftData)state.data=data.shiftData;
      if(Array.isArray(data.members)&&data.members.length>0){state.members=data.members;state.nextId=Math.max(...state.members.map(m=>m.id||0))+1;}
      setState({showSettings:false});setSaveStatus('saved');
    }catch(e){
      errDiv.textContent='⚠ 接続失敗: '+e.message;errDiv.style.display='block';
      saveBtn.textContent='保存して接続';saveBtn.disabled=false;
    }
  },'保存して接続');
  card.appendChild(saveBtn);
  card.appendChild(btn({width:'100%',background:'#f5f5f5',border:'none',color:C.sub,borderRadius:'10px',padding:'10px',fontSize:'12px'},()=>{GAS_URL='';localStorage.removeItem(LS_URL);urlInput.value='';setState({});},'ローカル保存のみに切り替え'));
  wrap.appendChild(card);
  return wrap;
}

// ── MEMBER EDITOR
function buildMemberEditor(){
  const wrap=div({background:'#fff7f9',borderBottom:'1px solid '+C.strong,padding:'12px'});
  const row=div({display:'flex',gap:'12px',flexWrap:'wrap'});
  ['main','sub'].forEach(cat=>{
    const label=cat==='main'?'メインカテゴリー':'サブカテゴリー';
    const color=cat==='main'?C.mainCat:C.subCat;
    const bg=cat==='main'?C.mainBg:C.subBg;
    const border=cat==='main'?C.mainBorder:C.subBorder;
    const filtered=state.members.filter(m=>m.category===cat);
    const box=div({background:bg,border:'1px solid '+border,borderRadius:'10px',padding:'12px 14px',minWidth:'260px',flex:'1'});
    const hdr=div({fontWeight:'700',color,fontSize:'13px',marginBottom:'10px',display:'flex',alignItems:'center',justifyContent:'space-between'});
    hdr.appendChild(txt(label));
    hdr.appendChild(btn({background:color,color:'#fff',border:'none',borderRadius:'6px',padding:'8px 14px',fontSize:'12px',fontWeight:'700'},()=>{const id=state.nextId;state.nextId++;setState({members:[...state.members,{id,name:'新メンバー',category:cat}]},true);},'＋ 追加'));
    box.appendChild(hdr);
    const list=div({display:'flex',flexDirection:'column',gap:'8px'});
    filtered.forEach((m,i)=>{
      const r=div({display:'flex',alignItems:'center',gap:'6px'});
      const arrs=div({display:'flex',flexDirection:'column',gap:'2px'});
      ['▲','▼'].forEach((lbl2,di)=>{
        const disabled=(di===0&&i===0)||(di===1&&i===filtered.length-1);
        arrs.appendChild(btn({background:'transparent',border:'none',color:disabled?C.muted:color,fontSize:'11px',padding:'3px 5px',opacity:disabled?'0.4':'1'},()=>{if(disabled)return;const idx=state.members.findIndex(x=>x.id===m.id);const a=[...state.members];const ni=di===0?idx-1:idx+1;[a[idx],a[ni]]=[a[ni],a[idx]];setState({members:a},true);},lbl2));
      });
      r.appendChild(arrs);
      const inp=el('input',{style:{flex:'1',background:'#fff',border:'1px solid '+border,borderRadius:'6px',color:C.text,padding:'10px',fontSize:'14px'},value:m.name});
      inp.addEventListener('input',e=>updateMemberName(m.id,e.target.value));
      r.appendChild(inp);
      r.appendChild(btn({background:'#fff',border:'1px solid '+border,color,borderRadius:'6px',padding:'8px 10px',fontSize:'11px',whiteSpace:'nowrap'},()=>{setState({members:state.members.map(x=>x.id===m.id?{...x,category:cat==='main'?'sub':'main'}:x)},true);},cat==='main'?'→サブ':'→メイン'));
      r.appendChild(btn({background:'#fde8e8',border:'none',color:C.warnText,borderRadius:'6px',padding:'8px 10px',fontSize:'15px'},()=>{setState({members:state.members.filter(x=>x.id!==m.id)},true);},'×'));
      list.appendChild(r);
    });
    if(!filtered.length)list.appendChild(div({fontSize:'12px',color:C.muted,textAlign:'center',padding:'8px 0'},['メンバーがいません']));
    box.appendChild(list);row.appendChild(box);
  });
  wrap.appendChild(row);return wrap;
}

// ── SHIFT TABLE
function buildShiftTab(ds,mm,sm){
  const wrap=div({overflow:'hidden'});
  wrap.appendChild(buildTable(ds,mm,sm));

  // 月が変わったときだけスクロール位置を左端にリセット
  const monthKey=state.year+'-'+state.month;
  if(monthKey!==lastRenderedMonth){
    lastRenderedMonth=monthKey;
    requestAnimationFrame(()=>{
      const tw=document.getElementById('shift-table-wrap');
      if(tw)tw.scrollLeft=0;
    });
  }


  return wrap;
}

function buildTable(ds,mm,sm){
  const {editMode}=state;const W={date:54,day:28,duty:96,sep:2,member:52};
  const wrap=div({overflowX:'auto',overflowY:'visible',WebkitOverflowScrolling:'touch',padding:'0 0 16px 0'});wrap.id='shift-table-wrap';
  const tbl=el('table',{style:{borderCollapse:'separate',borderSpacing:'0',tableLayout:'fixed',minWidth:(W.date+W.day+DUTY_COLS.length*W.duty+W.sep+mm.length*W.member+(sm.length?(W.sep+sm.length*W.member):0))+'px'}});
  const cg=el('colgroup');
  [{w:W.date},{w:W.day},...DUTY_COLS.map(()=>({w:W.duty})),{w:W.sep},...mm.map(()=>({w:W.member})),...(sm.length?[{w:W.sep}]:[]),...sm.map(()=>({w:W.member}))].forEach(({w})=>{const c=el('col');c.style.width=w+'px';cg.appendChild(c);});
  tbl.appendChild(cg);
  function mkTh(t,s){const th=el('th',{style:{padding:'8px 2px',fontWeight:'700',fontSize:'11px',textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',border:'1px solid '+C.border,background:'#fff',position:'sticky',top:'0',zIndex:'10',...s}});if(t)th.appendChild(document.createTextNode(t));return th;}
  const thead=el('thead');const tr1=el('tr');
  tr1.appendChild(mkTh('日付',{color:C.muted}));tr1.appendChild(mkTh('曜',{color:C.muted}));
  DUTY_COLS.forEach(dc=>tr1.appendChild(mkTh(dc.label,{background:dc.lightBg,color:dc.accent,borderLeft:'2px solid '+C.strong,borderRight:'2px solid '+C.strong})));
  tr1.appendChild(mkTh('',{padding:'0',background:C.strong,border:'none'}));
  mm.forEach(m=>tr1.appendChild(mkTh(m.name,{background:C.mainBg,color:C.mainCat})));
  if(sm.length)tr1.appendChild(mkTh('',{padding:'0',background:C.subBorder,border:'none'}));
  sm.forEach(m=>tr1.appendChild(mkTh(m.name,{background:C.subBg,color:C.subCat})));
  thead.appendChild(tr1);tbl.appendChild(thead);
  const tbody=el('tbody');
  ds.forEach((date,di)=>{
    const dstr=toDS(date);const wkEnd=isWk(date)||isHol(date);const req=isReq(date);
    const rowBg=wkEnd?C.wkBg:(di%2===0?C.bg:C.bgAlt);
    const is20=date.getDate()===20,is21=date.getDate()===21;const dc=dayClr(date);
    const isToday=toDS(date)===TODAY_DS;
    const tr=el('tr',{style:{background:rowBg,borderTop:is21?'2px solid '+C.accent:(isToday?'2px solid #f7a800':''),borderBottom:is20?'2px solid '+C.accent:(isToday?'2px solid #f7a800':''),outline:isToday?'':''}});
    function mkTd(s){return el('td',{style:{border:'1px solid '+C.border,padding:'3px 2px',height:'44px',verticalAlign:'middle',textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',...s}});}
    // swap モード時の日付セルスタイル
    const isSwapA=state.swapMode&&state.swapDayA===dstr;
    const isSwapB=state.swapMode&&state.swapDayB===dstr;
    const dateBg=isToday?'#f7a800':isSwapA?'#c2506e':isSwapB?'#7a5080':rowBg;
    const dateFg=isToday||isSwapA||isSwapB?'#fff':dc;
    const dateTd=mkTd({color:dateFg,fontWeight:'700',fontSize:'12px',background:dateBg,position:'relative',cursor:state.swapMode?'pointer':'default'});
    dateTd.appendChild(document.createTextNode((date.getMonth()+1)+'/'+date.getDate()));
    if(isToday&&!isSwapA&&!isSwapB)dateTd.appendChild(el('span',{style:{fontSize:'8px',display:'block',color:'#fff',opacity:'0.9'}},'今日'));
    if(isSwapA)dateTd.appendChild(el('span',{style:{fontSize:'8px',display:'block',color:'#fff'}},'日A'));
    if(isSwapB)dateTd.appendChild(el('span',{style:{fontSize:'8px',display:'block',color:'#fff'}},'日B'));
    if(isHol(date)&&!isSwapA&&!isSwapB)dateTd.appendChild(el('span',{style:{fontSize:'9px',color:isToday?'#fff':C.sun,display:'block'}},['祝']));
    // swap モード時のタップ処理
    if(state.swapMode){
      dateTd.addEventListener('click',()=>{
        if(!state.swapDayA){
          setState({swapDayA:dstr});
        } else if(state.swapDayA===dstr){
          setState({swapDayA:null}); // 選択解除
        } else if(!state.swapDayB){
          setState({swapDayB:dstr});
        } else {
          setState({swapDayB:dstr}); // B を更新
        }
      });
    }
    tr.appendChild(dateTd);
    const wdTd=mkTd({color:dc,fontWeight:'800',fontSize:'13px',background:rowBg,borderRight:'2px solid '+C.strong});
    wdTd.appendChild(document.createTextNode(dayLbl(date)));tr.appendChild(wdTd);
    DUTY_COLS.forEach(dc2=>{
      const vals=getDutyNames(dstr,dc2.key);const needed=dc2.req?req:true;const miss=needed&&!vals.length;
      const cellBg=miss?'#fde8e8':vals.length?dc2.lightBg:rowBg;
      const dtd=mkTd({background:cellBg,borderLeft:'2px solid '+C.strong,borderRight:'2px solid '+C.strong,cursor:editMode==='edit'?'pointer':'default',padding:'4px 2px'});
      if(editMode==='edit')dtd.addEventListener('click',()=>openDutyModal(dstr,dc2.key));
      if(miss)dtd.appendChild(el('span',{style:{color:C.warnText,fontSize:'10px',fontWeight:'700'}},['⚠']));
      else if(vals.length){const inner=div({display:'flex',flexWrap:'wrap',gap:'2px',justifyContent:'center'});vals.forEach(v=>inner.appendChild(el('span',{style:{background:dc2.tag,color:'#fff',borderRadius:'4px',padding:'2px 4px',fontSize:'10px',fontWeight:'700'}},[v])));dtd.appendChild(inner);}
      else dtd.appendChild(el('span',{style:{color:C.muted,fontSize:'11px'}},['—']));
      tr.appendChild(dtd);
    });
    tr.appendChild(mkTd({padding:'0',background:C.strong,border:'none'}));
    [...mm,...(sm.length?[null]:[]),...sm].forEach(m=>{
      if(m===null){tr.appendChild(mkTd({padding:'0',background:C.subBorder,border:'none'}));return;}
      const sts=getStatuses(dstr,m.name);const ss=STATUS_STYLE[sts[0]];
      const mtd=mkTd({background:ss?ss.bg:rowBg,cursor:editMode==='edit'?'pointer':'default',padding:'3px 2px'});
      if(editMode==='edit')mtd.addEventListener('click',()=>openMemberModal(dstr,m.name));
      if(sts.length){const inner=div({display:'flex',flexWrap:'wrap',gap:'1px',justifyContent:'center'});sts.forEach(st=>{const s=STATUS_STYLE[st];inner.appendChild(el('span',{style:{background:s?.bg||'#eee',color:s?.text||'#333',border:'1px solid '+(s?.border||'#ccc'),borderRadius:'3px',padding:'0 2px',fontSize:'9px',fontWeight:'600',whiteSpace:'nowrap',display:'block',lineHeight:'1.6'}},[st]));});mtd.appendChild(inner);}
      tr.appendChild(mtd);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);wrap.appendChild(tbl);return wrap;
}

// ── ボトムシート共通
function buildSheet(onClose){
  const ov=div({position:'fixed',inset:'0',background:'rgba(60,10,30,0.45)',zIndex:'200',display:'flex',alignItems:'flex-end',animation:'fadeIn 0.2s ease'});
  ov.addEventListener('click',onClose);
  const sheet=div({background:'#fff',borderRadius:'20px 20px 0 0',padding:'0 16px',paddingBottom:'max(24px,env(safe-area-inset-bottom))',width:'100%',maxHeight:'90vh',overflowY:'auto',animation:'slideUp 0.25s ease',WebkitOverflowScrolling:'touch'});
  sheet.addEventListener('click',e=>e.stopPropagation());

// 🗑 リセットモーダル（担当 or スケジュール）

function buildResetModal(){
  const{ov,sheet}=buildSheet(()=>setState({showResetModal:false,activeAction:'edit'}));

  sheet.appendChild(div({fontFamily:'Georgia,serif',fontSize:'16px',fontWeight:'700',
    color:C.accent,marginBottom:'4px'},['🗑 リセット']));
  sheet.appendChild(div({fontSize:'12px',color:C.muted,marginBottom:'16px'},
    [state.year+'年'+state.month+'月分のデータを選択してクリアします']));

  // ── 担当リセット ──
  const dutyCard=div({background:'#fde8e8',border:'1px solid '+C.warnBorder,
    borderRadius:'14px',padding:'14px 16px',marginBottom:'12px'});
  dutyCard.appendChild(div({fontWeight:'700',fontSize:'14px',color:C.warnText,
    marginBottom:'6px'},['🗑 担当欄リセット']));
  dutyCard.appendChild(div({fontSize:'12px',color:C.warnText,marginBottom:'12px',lineHeight:'1.6'},
    ['事務所番・金庫番・掃除の担当者をすべてクリアします。メンバーのスケジュールは残ります。']));
  dutyCard.appendChild(btn({width:'100%',background:C.warnText,color:'#fff',border:'none',
    borderRadius:'10px',padding:'12px',fontSize:'13px',fontWeight:'700',minHeight:'48px'},
    ()=>{
      if(!confirm(state.year+'年'+state.month+'月の担当欄をすべてクリアしますか？'))return;
      const nd={...state.data};
      days().forEach(d=>{
        const ds=toDS(d);if(!nd[ds])return;
        const dd={...(nd[ds])};
        DUTY_COLS.forEach(dc=>{
          const lbl=DUTY_STATUS_MAP[dc.key];
          dd[dc.key]=[];
          state.members.forEach(({name})=>{
            const p=Array.isArray(dd[name])?dd[name]:(dd[name]?[dd[name]]:[]);
            if(p.includes(lbl))dd[name]=p.filter(s=>s!==lbl);
          });
        });
        nd[ds]=dd;
      });
      setState({data:nd,showResetModal:false,activeAction:'edit'},true);
    },'担当欄をクリア'));
  sheet.appendChild(dutyCard);

  // ── スケジュールリセット ──
  const SCHEDULE_STS=['責任者','夜間現場','公休','有休','午前半休','午後半休'];
  const schedCard=div({background:'#ede8f5',border:'1px solid #c9b8dc',
    borderRadius:'14px',padding:'14px 16px',marginBottom:'12px'});
  schedCard.appendChild(div({fontWeight:'700',fontSize:'14px',color:'#7a5080',
    marginBottom:'6px'},['📅 スケジュールリセット']));
  schedCard.appendChild(div({fontSize:'12px',color:'#7a5080',marginBottom:'6px',lineHeight:'1.6'},
    ['メンバーのスケジュール（公休・有休・半休・責任者・夜間現場）をクリアします。担当欄（事務所番・金庫番・掃除）は残ります。']));

  // メンバー選択（個別 or 全員）
  const memberSel=div({marginBottom:'12px'});
  memberSel.appendChild(div({fontSize:'11px',color:'#7a5080',fontWeight:'700',marginBottom:'6px'},['対象メンバーを選択（複数可）']));
  const selSet=new Set(['__all__']);
  const memberGrid=div({display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(72px,1fr))',gap:'6px',marginBottom:'8px'});

  // 全員ボタン
  const allBtn=btn({background:'#7a5080',color:'#fff',border:'2px solid #7a5080',
    borderRadius:'8px',padding:'8px 4px',fontSize:'12px',fontWeight:'700',minHeight:'44px'},
    ()=>{
      if(selSet.has('__all__')){selSet.clear();}
      else{selSet.clear();selSet.add('__all__');}
      updateSelButtons();
    },'✓ 全員');
  memberGrid.appendChild(allBtn);

  // 個別メンバーボタン
  const memBtns={};
  state.members.forEach(m=>{
    const b=btn({background:'#f5f5f5',color:C.text,border:'2px solid '+C.border,
      borderRadius:'8px',padding:'8px 4px',fontSize:'12px',fontWeight:'500',minHeight:'44px'},
      ()=>{
        selSet.delete('__all__');
        if(selSet.has(m.name))selSet.delete(m.name);
        else selSet.add(m.name);
        updateSelButtons();
      },m.name);
    memBtns[m.name]=b;
    memberGrid.appendChild(b);
  });

  function updateSelButtons(){
    const isAll=selSet.has('__all__');
    allBtn.style.background=isAll?'#7a5080':'#f5f5f5';
    allBtn.style.color=isAll?'#fff':'#3d1f2a';
    allBtn.textContent=isAll?'✓ 全員':'全員';
    state.members.forEach(m=>{
      const sel=selSet.has(m.name);
      memBtns[m.name].style.background=sel?'#ede8f5':'#f5f5f5';
      memBtns[m.name].style.color=sel?'#7a5080':C.text;
      memBtns[m.name].style.border='2px solid '+(sel?'#7a5080':C.border);
      memBtns[m.name].style.fontWeight=sel?'700':'500';
    });
  }
  updateSelButtons();
  memberSel.appendChild(memberGrid);
  schedCard.appendChild(memberSel);

  schedCard.appendChild(btn({width:'100%',background:'#7a5080',color:'#fff',border:'none',
    borderRadius:'10px',padding:'12px',fontSize:'13px',fontWeight:'700',minHeight:'48px'},
    ()=>{
      const targets=selSet.has('__all__')?state.members.map(m=>m.name):[...selSet];
      if(!targets.length){alert('対象メンバーを選択してください');return;}
      const label=selSet.has('__all__')?'全員':'選択メンバー';
      if(!confirm(state.year+'年'+state.month+'月の'+label+'のスケジュールをクリアしますか？'))return;
      const nd={...state.data};
      days().forEach(d=>{
        const ds=toDS(d);if(!nd[ds])return;
        const dd={...(nd[ds])};
        targets.forEach(name=>{
          const cur=Array.isArray(dd[name])?dd[name]:(dd[name]?[dd[name]]:[]);
          // 担当ラベルは残し、スケジュールのみ削除
          dd[name]=cur.filter(s=>!SCHEDULE_STS.includes(s));
        });
        nd[ds]=dd;
      });
      setState({data:nd,showResetModal:false,activeAction:'edit'},true);
    },'スケジュールをクリア'));
  sheet.appendChild(schedCard);

  // キャンセル
  sheet.appendChild(btn({width:'100%',background:'#f5f5f5',border:'none',color:C.sub,
    borderRadius:'12px',padding:'14px',fontSize:'13px',minHeight:'52px'},
    ()=>setState({showResetModal:false,activeAction:'edit'}),'キャンセル'));

  return ov;
}

function buildCopyModeContent(){
  const{modal,copyStatus}=state;
  const ss=STATUS_STYLE[copyStatus];
  const wrap=div({});

  // ヘッダー
  const hdr=div({display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'});
  hdr.appendChild(div({background:ss?.bg||C.aLight,color:ss?.text||C.accent,border:'2px solid '+(ss?.border||C.aLight),borderRadius:'8px',padding:'5px 14px',fontWeight:'700',fontSize:'14px'},['📋 '+copyStatus]));
  hdr.appendChild(div({fontWeight:'700',fontSize:'14px',color:C.text},['を複製']));
  wrap.appendChild(hdr);
  wrap.appendChild(div({fontSize:'12px',color:C.muted,marginBottom:'8px'},['対象：'+modal.member]));
  wrap.appendChild(div({background:'#fdf3dc',border:'1px solid #d4a843',borderRadius:'8px',padding:'8px 10px',fontSize:'12px',color:'#7d5a0a',marginBottom:'12px'},['📅 適用したい日付をタップして選択。']));

  // 選択状態はローカル変数で管理（再描画なし）
  const localSelected=new Set(state.copyDays);

  // カウント表示・ボタンを先に参照できるよう前方宣言
  let countEl,applyBtn;

  function updateUI(){
    const sz=localSelected.size;
    if(countEl){
      countEl.textContent=sz>0?sz+'日を選択中':'日付を選んでください';
      countEl.style.color=sz>0?(ss?.text||C.accent):C.muted;
      countEl.style.fontWeight=sz>0?'700':'400';
    }
    if(applyBtn){
      applyBtn.textContent=sz>0?sz+'日に適用':'日付を選択';
      applyBtn.style.background=sz>0?C.accent:'#ddd';
      applyBtn.style.cursor=sz>0?'pointer':'not-allowed';
    }
  }

  // 日付グリッド
  const grid=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',maxHeight:'260px',overflowY:'auto',marginBottom:'12px'});
  days().forEach(d=>{
    const ds=toDS(d);
    const dc2=dayClr(d);
    const isWH=isWk(d)||isHol(d);

    function getBg(sel){return sel?(ss?.bg||C.aLight):isWH?C.wkBg:'#fafafa';}
    function getBorder(sel){return '2px solid '+(sel?(ss?.border||C.accent):C.border);}
    function getColor(sel){return sel?(ss?.text||C.accent):dc2;}

    const b=document.createElement('button');
    const sel0=localSelected.has(ds);
    Object.assign(b.style,{
      background:getBg(sel0),border:getBorder(sel0),borderRadius:'8px',
      padding:'8px 2px',fontSize:'12px',fontWeight:sel0?'700':'400',
      color:getColor(sel0),lineHeight:'1.3',minHeight:'50px',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      width:'100%',cursor:'pointer',fontFamily:'inherit',
    });
    const dateDiv=document.createElement('div');
    dateDiv.textContent=(d.getMonth()+1)+'/'+d.getDate();
    const dayDiv=document.createElement('div');
    dayDiv.style.fontSize='10px';
    dayDiv.textContent=dayLbl(d);
    const checkDiv=document.createElement('div');
    checkDiv.style.fontSize='9px';
    checkDiv.textContent='✓';
    checkDiv.style.display=sel0?'':'none';
    b.appendChild(dateDiv);b.appendChild(dayDiv);b.appendChild(checkDiv);

    b.addEventListener('click',()=>{
      const nowSel=localSelected.has(ds);
      nowSel?localSelected.delete(ds):localSelected.add(ds);
      const nextSel=localSelected.has(ds);
      // ボタンのみ直接更新（再描画なし）
      b.style.background=getBg(nextSel);
      b.style.border=getBorder(nextSel);
      b.style.color=getColor(nextSel);
      b.style.fontWeight=nextSel?'700':'400';
      checkDiv.style.display=nextSel?'':'none';
      // カウント・適用ボタン更新
      updateUI();
    });
    grid.appendChild(b);
  });
  wrap.appendChild(grid);

  // カウント表示
  countEl=div({textAlign:'center',fontSize:'13px',marginBottom:'12px',color:C.muted,fontWeight:'400'},['日付を選んでください']);
  wrap.appendChild(countEl);

  // ボタン行
  const row=div({display:'flex',gap:'8px'});

  // すべて解除
  row.appendChild(btn({flex:'1',background:'#f5f5f5',border:'none',color:C.sub,borderRadius:'10px',padding:'14px',fontSize:'12px',minHeight:'52px'},()=>{
    localSelected.clear();
    // 全ボタンの選択状態をリセット
    grid.querySelectorAll('button').forEach((b2,i)=>{
      const d2=days()[i];const ds2=toDS(d2);const isWH2=isWk(d2)||isHol(d2);
      b2.style.background=isWH2?C.wkBg:'#fafafa';
      b2.style.border='2px solid '+C.border;
      b2.style.color=dayClr(d2);b2.style.fontWeight='400';
      b2.querySelector('div:last-child').style.display='none';
    });
    updateUI();
  },'すべて解除'));

  // 適用ボタン
  applyBtn=document.createElement('button');
  Object.assign(applyBtn.style,{flex:'2',background:'#ddd',color:'#fff',border:'none',borderRadius:'10px',padding:'14px',fontSize:'13px',fontWeight:'700',minHeight:'52px',cursor:'not-allowed',fontFamily:'inherit'});
  applyBtn.textContent='日付を選択';
  applyBtn.addEventListener('click',()=>{
    if(!localSelected.size)return;
    const member=modal.member;let d={...state.data};
    localSelected.forEach(ds=>{
      const cur=Array.isArray(d[ds]?.[member])?d[ds][member]:(d[ds]?.[member]?[d[ds][member]]:[]);
      const next=cur.includes(copyStatus)?cur:[...cur,copyStatus];
      const dd={...(d[ds]||{})};
      const synced=syncMemberToDuty({...dd,[member]:next},member,next);
      d={...d,[ds]:synced};
    });
    // stateを更新してモーダルを閉じる
    state.copyDays=new Set();
    setState({data:d,copyMode:false,copyStatus:null,copyDays:new Set(),modal:null},true);
  });
  row.appendChild(applyBtn);
  wrap.appendChild(row);
  updateUI();
  return wrap;
}

// ============================================================
// 📋 前月データコピー
// ============================================================
function copyPrevMonthData(){
  const prevM=state.month===1?12:state.month-1;
  const prevY=state.month===1?state.year-1:state.year;
  const prevDays=getMonthDays(prevY,prevM);
  const currDays=getMonthDays(state.year,state.month);
  const LEAVE_STS=['公休','有休','午前半休','午後半休'];

  // 前月の日付→曜日マップ
  const prevByDow={};
  prevDays.forEach(d=>{
    const key=d.getDay()+'_'+d.getDate();
    const ds=toDS(d);
    state.members.forEach(m=>{
      const sts=(state.data[ds]?.[m.name]||[]).filter(s=>LEAVE_STS.includes(s));
      if(sts.length){
        if(!prevByDow[m.name])prevByDow[m.name]=[];
        prevByDow[m.name].push({dow:d.getDay(),date:d.getDate(),sts});
      }
    });
  });

  // 同じ曜日・日付に近いものをコピー（単純に同じ週番号・曜日でマッチング）
  const nd={...state.data};
  let copied=0;
  currDays.forEach(d=>{
    const ds=toDS(d);
    state.members.forEach(m=>{
      if(!prevByDow[m.name])return;
      // 同じ曜日で同じ週(1-5)のエントリを探す
      const week=Math.ceil(d.getDate()/7);
      const match=prevByDow[m.name].find(p=>p.dow===d.getDay()&&Math.ceil(p.date/7)===week);
      if(match){
        const dd={...(nd[ds]||{})};
        const cur=Array.isArray(dd[m.name])?dd[m.name]:(dd[m.name]?[dd[m.name]]:[]);
        const newSts=[...new Set([...cur,...match.sts])];
        nd[ds]=syncMemberToDuty({...dd,[m.name]:newSts},m.name,newSts);
        copied++;
      }
    });
  });

  setState({data:nd},true);
  alert('✅ 前月の休暇設定をコピーしました！\n'+copied+'件の設定を引き継ぎました。\nシフトタブで確認してください。');
}

// 📊 担当回数の偏り表示
// ============================================================
function buildDutyBalanceChart(ds){
  const mm=mainMembers();
  if(!mm.length)return div({});

  // 各メンバーの担当回数を集計
  const counts={};
  mm.forEach(m=>{counts[m.name]=0;});
  ds.forEach(d=>{
    const dstr=toDS(d);
    DUTY_COLS.forEach(dc=>{
      getDutyNames(dstr,dc.key).forEach(n=>{if(counts[n]!==undefined)counts[n]++;});
    });
  });

  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return div({});
  const maxCount=Math.max(...entries.map(([,v])=>v),1);
  const totalCount=entries.reduce((s,[,v])=>s+v,0);
  const avg=mm.length>0?totalCount/mm.length:0;

  const section=div({background:'#fff',border:'1px solid '+C.border,borderRadius:'14px',padding:'14px',marginBottom:'20px'});
  const hdr=div({display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'});
  hdr.appendChild(div({fontWeight:'700',fontSize:'14px',color:C.accent},['📊 担当回数の偏り']));
  hdr.appendChild(div({fontSize:'11px',color:C.muted},['平均 '+avg.toFixed(1)+'回']));
  section.appendChild(hdr);

  entries.forEach(([name,count])=>{
    const ratio=count/maxCount;
    const diff=count-avg;
    const barColor=diff>1.5?'#e88fa8':diff<-1.5?'#7fb3d3':'#6abf99';
    const row=div({marginBottom:'10px'});
    const labelRow=div({display:'flex',justifyContent:'space-between',marginBottom:'4px',alignItems:'center'});
    labelRow.appendChild(div({fontSize:'12px',fontWeight:'600',color:C.text},[name]));
    const countDiv=div({display:'flex',alignItems:'center',gap:'6px'});
    countDiv.appendChild(div({fontSize:'13px',fontWeight:'700',color:barColor},[count+'回']));
    if(Math.abs(diff)>0.5){
      countDiv.appendChild(div({fontSize:'10px',color:barColor,background:barColor+'22',borderRadius:'4px',padding:'1px 5px',fontWeight:'700'},[diff>0?'+'+diff.toFixed(1):diff.toFixed(1)]));
    }
    labelRow.appendChild(countDiv);
    row.appendChild(labelRow);
    const barBg=div({background:'#f0f0f0',borderRadius:'4px',height:'8px',overflow:'hidden'});
    const bar=div({background:barColor,borderRadius:'4px',height:'8px',width:(ratio*100)+'%',transition:'width 0.4s ease'});
    barBg.appendChild(bar);row.appendChild(barBg);
    section.appendChild(row);
  });

  // 凡例
  const legend=div({display:'flex',gap:'12px',marginTop:'12px',flexWrap:'wrap'});
  [{color:'#e88fa8',label:'多い(+1.5以上)'},{color:'#6abf99',label:'均等'},{color:'#7fb3d3',label:'少ない(-1.5以下)'}].forEach(({color,label})=>{
    const l=div({display:'flex',alignItems:'center',gap:'4px',fontSize:'10px',color:C.muted});
    l.appendChild(div({width:'10px',height:'10px',borderRadius:'2px',background:color,flexShrink:'0'}));
    l.appendChild(txt(label));legend.appendChild(l);
  });
  section.appendChild(legend);
  return section;
}

function executeSwap(dsA,dsB){
  const d={...state.data};
  const ddA={...(d[dsA]||{})};
  const ddB={...(d[dsB]||{})};

  // 担当キー（__office__/__safe__/__clean__）のみ入れ替え
  const tmpDuties={};
  DUTY_COLS.forEach(dc=>{
    tmpDuties[dc.key]={
      a:[...(ddA[dc.key]||[])],
      b:[...(ddB[dc.key]||[])],
    };
  });

  // 担当キーを入れ替え
  DUTY_COLS.forEach(dc=>{
    ddA[dc.key]=tmpDuties[dc.key].b;
    ddB[dc.key]=tmpDuties[dc.key].a;
  });

  // メンバーの担当ステータス（事務所番・金庫番・掃除）も同期
  const DUTY_LABELS=DUTY_COLS.map(dc=>dc.label);
  state.members.forEach(({name})=>{
    // A日のメンバーステータスから担当ラベルを除去し、B日の担当に基づき再設定
    const stsA=(ddA[name]||[]).filter(s=>!DUTY_LABELS.includes(s));
    const stsB=(ddB[name]||[]).filter(s=>!DUTY_LABELS.includes(s));
    DUTY_COLS.forEach(dc=>{
      if((ddA[dc.key]||[]).includes(name))stsA.push(dc.label);
      if((ddB[dc.key]||[]).includes(name))stsB.push(dc.label);
    });
    if(stsA.length||ddA[name])ddA[name]=stsA;
    if(stsB.length||ddB[name])ddB[name]=stsB;
  });

  d[dsA]=ddA;
  d[dsB]=ddB;

  const dA=new Date(dsA),dB=new Date(dsB);
  setState({
    data:d,
    swapDayA:null,swapDayB:null,
  },true);

  // 完了通知
  const{ov,sheet}=buildSheet(()=>ov.remove());
  sheet.appendChild(div({fontWeight:'700',fontSize:'15px',color:'#2e7d5e',marginBottom:'8px'},['✅ 入れ替え完了！']));
  sheet.appendChild(div({fontSize:'13px',color:C.text,marginBottom:'16px'},[
    (dA.getMonth()+1)+'/'+dA.getDate()+'（'+dayLbl(dA)+'）と '+
    (dB.getMonth()+1)+'/'+dB.getDate()+'（'+dayLbl(dB)+'）の担当を入れ替えました。'
  ]));
  sheet.appendChild(btn({width:'100%',background:C.accent,color:'#fff',border:'none',borderRadius:'10px',padding:'14px',fontSize:'14px',fontWeight:'700',minHeight:'52px'},()=>{ov.remove();},'閉じる'));
  const appEl=document.getElementById('app');
  if(appEl)appEl.appendChild(ov);
}

  const mem=state.members.find(m=>m.name===personalMember);const catColor=mem?.category==='main'?C.mainCat:C.subCat;
  const summaryBar=div({background:'#fff',border:'1px solid '+C.border,borderRadius:'12px',padding:'14px',marginBottom:'16px'});
  summaryBar.appendChild(div({fontWeight:'700',color:catColor,fontSize:'14px',marginBottom:'12px'},[personalMember+' さんの今月']));
  const statRow=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'10px'});
  DUTY_COLS.forEach(dc=>{const cnt=ds.filter(d=>getDutyNames(toDS(d),dc.key).includes(personalMember)).length;const card=div({background:dc.lightBg,borderRadius:'8px',padding:'10px',textAlign:'center'});card.appendChild(div({fontSize:'22px',fontWeight:'700',color:dc.accent},[String(cnt)]));card.appendChild(div({fontSize:'10px',color:dc.accent,marginTop:'2px'},[dc.label]));statRow.appendChild(card);});
  summaryBar.appendChild(statRow);
  const statRow2=div({display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px'});
  ['公休','有休','午前半休','午後半休'].forEach(st=>{const cnt=ds.filter(d=>getStatuses(toDS(d),personalMember).includes(st)).length;const ss=STATUS_STYLE[st];const card=div({background:cnt>0?ss.bg:'#f8f8f8',borderRadius:'8px',padding:'8px 4px',textAlign:'center',border:'1px solid '+(cnt>0?ss.border:C.border)});card.appendChild(div({fontSize:'18px',fontWeight:'700',color:cnt>0?ss.text:C.muted},[String(cnt)]));card.appendChild(div({fontSize:'9px',color:cnt>0?ss.text:C.muted,marginTop:'2px',lineHeight:'1.2'},[st]));statRow2.appendChild(card);});
  summaryBar.appendChild(statRow2);wrap.appendChild(summaryBar);
  wrap.appendChild(div({fontWeight:'700',color:C.text,fontSize:'13px',marginBottom:'10px'},['📅 担当・予定一覧']));
  ds.forEach(d=>{
    const dstr=toDS(d);const sts=getStatuses(dstr,personalMember);const dutyLabels=DUTY_COLS.filter(dc=>getDutyNames(dstr,dc.key).includes(personalMember));
    if(!sts.length&&!dutyLabels.length)return;
    const wkEnd=isWk(d)||isHol(d);
    const row=div({display:'flex',alignItems:'flex-start',gap:'10px',padding:'12px',marginBottom:'8px',background:'#fff',borderRadius:'12px',border:'1px solid '+(wkEnd?C.strong:C.border),borderLeft:'4px solid '+(wkEnd?C.accent:C.border)});
    const datePart=div({flexShrink:'0',width:'46px',textAlign:'center'});
    datePart.appendChild(div({fontSize:'17px',fontWeight:'700',color:dayClr(d)},[(d.getMonth()+1)+'/'+d.getDate()]));
    datePart.appendChild(div({fontSize:'12px',color:dayClr(d),fontWeight:'600'},[dayLbl(d)]));
    if(isHol(d))datePart.appendChild(div({fontSize:'9px',color:C.sun},['祝']));
    row.appendChild(datePart);
    const badges=div({display:'flex',flexWrap:'wrap',gap:'5px',flex:'1',alignItems:'center'});
    dutyLabels.forEach(dc=>{const b=div({background:dc.tag,color:'#fff',borderRadius:'6px',padding:'5px 10px',fontSize:'12px',fontWeight:'700'});b.appendChild(txt(dc.label));badges.appendChild(b);});
    sts.filter(st=>!['事務所番','金庫番','掃除'].includes(st)).forEach(st=>{const ss=STATUS_STYLE[st];const b=div({background:ss.bg,color:ss.text,border:'1px solid '+ss.border,borderRadius:'6px',padding:'5px 10px',fontSize:'12px',fontWeight:'600'});b.appendChild(txt(st));badges.appendChild(b);});
    row.appendChild(badges);wrap.appendChild(row);
  });
  const hasAny=ds.some(d=>{const dstr=toDS(d);return getStatuses(dstr,personalMember).length>0||DUTY_COLS.some(dc=>getDutyNames(dstr,dc.key).includes(personalMember));});
  if(!hasAny)wrap.appendChild(div({textAlign:'center',color:C.muted,fontSize:'14px',padding:'30px 0'},['この月の担当・予定はありません']));
  return wrap;
}

// ============================================================
// 起動
// ============================================================
// 過去3ヶ月より古いデータを削除する
function pruneOldData(data){
  const cutoff=new Date();
  cutoff.setDate(cutoff.getDate()-90); // 90日前
  const cutoffDS=cutoff.toISOString().slice(0,10);
  let pruned=false;
  Object.keys(data).forEach(ds=>{
    if(ds<cutoffDS){
      delete data[ds];
      pruned=true;
    }
  });
  return{data,pruned};
}

function initApp(loaded){
  const raw=loaded.shiftData||{};

  // 起動時に古いデータを自動削除
  const{data,pruned}=pruneOldData(raw);
  state.data=data;

  if(Array.isArray(loaded.members)&&loaded.members.length>0){
    state.members=loaded.members;
    state.nextId=state.members.length>0?Math.max(...state.members.map(m=>m.id||0))+1:11;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('setup').classList.remove('show');
  document.getElementById('app').style.display='block';

  // 削除があった場合は自動保存
  if(pruned)scheduleSave();

  render();
}

(async()=>{
  if(GAS_URL){
    document.getElementById('loading-msg').textContent='データを読み込み中...';
    try{
      const data=await gasLoad();
      initApp(data);
    }catch(e){
      // GAS接続失敗→ローカルデータで起動
      const sd=localStorage.getItem(LS_DATA);
      const sm=localStorage.getItem(LS_MEM);
      initApp({shiftData:sd?JSON.parse(sd):{},members:sm?JSON.parse(sm):null});
      setTimeout(()=>setSaveStatus('error'),500);
    }
  }else{
    const sd=localStorage.getItem(LS_DATA);
    const sm=localStorage.getItem(LS_MEM);
    if(sd||sm){
      // ローカルデータあり→直接起動
      initApp({shiftData:sd?JSON.parse(sd):{},members:sm?JSON.parse(sm):null});
    }else{
      // 初回→URL設定画面
      document.getElementById('loading').style.display='none';
      document.getElementById('setup').classList.add('show');
    }
  }
})();
</script>
